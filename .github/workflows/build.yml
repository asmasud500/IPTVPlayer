name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept SDK licenses & Install
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        run: |
          set -e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== Build output ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "APK size: $(du -h app/build/outputs/apk/debug/app-debug.apk)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTVPlayer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
